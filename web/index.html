<body>
  <!-- Runtime config: server.js injects env vars before Flutter boots -->
  <script src="/env-config.js"></script>
  <!-- Force service worker update on every page load to prevent stale cache -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var reg of registrations) { reg.update(); }
      });
    }
  </script>
  <!-- v16 diagnostic: switch to HTML renderer to test if the washed-out/
       unscrollable bug on context.go('/') is CanvasKit-specific.
       Previous: canvaskit (had compositing bugs), skwasm (had saveLayer bugs). -->

    window.flutterConfiguration = {
      renderer: "html"
    };
  </script>
